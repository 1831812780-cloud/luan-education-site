<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>一个好老师应该做什么？｜庐安</title><link rel="stylesheet" href="../styles.css" /></head><body class="article-page"><header class="article-header"><a href="../index.html#journal"><img src="../公司网站资料/公司品牌logo/庐安—横版/黑色的横板“庐安”.png" alt="庐安" /></a><span>JOURNAL</span></header><main class="article-main"><p class="section-label">XUEJIAO JOURNAL</p><h1>一个好老师应该做什么？</h1><p>今天的教师角色正在发生变化。知识不再稀缺，信息触手可及，但理解、陪伴和信任依然珍贵。一个好老师，首先应该是学生成长道路上的同行者。</p><p>好的老师懂得倾听，愿意等待，也尊重差异。他们关注的不只是成绩，更是孩子的情绪、人格和未来发展的可能性。</p><p>课堂之外，教师还应该成为学习环境的设计者。让学生拥有选择权、参与感和成就感，让学习从被动接受转变为主动探索。</p><blockquote>老师最大的价值，也许不是教会了什么知识，而是在关键时刻点亮了一束光。</blockquote></main></body></html>
