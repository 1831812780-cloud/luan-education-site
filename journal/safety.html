<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>心理安全感，比成绩更重要｜庐安</title><link rel="stylesheet" href="../styles.css" /></head><body class="article-page"><header class="article-header"><a href="../index.html#journal"><img src="../公司网站资料/公司品牌logo/庐安—横版/黑色的横板“庐安”.png" alt="庐安" /></a><span>JOURNAL</span></header><main class="article-main"><p class="section-label">XUEJIAO JOURNAL</p><h1>心理安全感，比成绩更重要。</h1><p>在长期教育实践中，我越来越深刻地感受到，心理安全感比任何分数都重要。一个害怕失败、害怕评价、害怕犯错的孩子，即使成绩优秀，也很难真正享受学习。</p><p>心理安全感意味着：孩子知道，无论成功还是失败，自己依然被理解、被尊重、被接纳。只有在这样的环境里，他们才敢表达不同意见，尝试新的可能，承担成长中的风险。</p><p>教育首先应该保护孩子对世界的信任，对自己的信心。成绩决定的是阶段性的表现，而安全感决定的是面对人生的能力。</p><blockquote>让孩子相信，犯错并不可怕，成长可以慢一点，人生拥有无限可能。</blockquote></main></body></html>
